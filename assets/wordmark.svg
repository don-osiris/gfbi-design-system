<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="GFBI wordmark">
  <title>GFBI — Glance Foresight &amp; Behavioral Insights</title>

  <!-- Mark: cobalt chip with rising trend line + forecast point -->
  <g transform="translate(16,20)">
    <rect x="0" y="0" width="80" height="80" rx="2" fill="#2563EB"/>

    <line x1="14" y1="62" x2="66" y2="62" stroke="#FAFAF9" stroke-width="1" opacity="0.35"/>
    <line x1="60" y1="18" x2="70" y2="10" stroke="#FAFAF9" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.5" stroke-linecap="round"/>

    <polyline points="14,54 28,42 44,30 60,18"
              fill="none" stroke="#FAFAF9" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="14" cy="54" r="2"   fill="#FAFAF9"/>
    <circle cx="28" cy="42" r="2"   fill="#FAFAF9"/>
    <circle cx="44" cy="30" r="2"   fill="#FAFAF9"/>
    <circle cx="60" cy="18" r="4.5" fill="#FAFAF9"/>
    <circle cx="60" cy="18" r="2"   fill="#2563EB"/>
  </g>

  <!-- Wordmark: 4 letters, slightly larger to balance the mark -->
  <text
    x="120"
    y="80"
    font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
    font-size="68"
    font-weight="600"
    letter-spacing="-1"
    fill="#0F172A"
  >GFBI</text>
</svg>
