<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" role="img" aria-label="AbuChip wordmark, monochrome">
  <title>AbuChip — monochrome</title>

  <!-- Mark: single-ink chip -->
  <g transform="translate(16,20)">
    <rect x="0" y="0" width="80" height="80" rx="2" fill="#0F172A"/>
    <rect x="14" y="14" width="22" height="22" rx="2" fill="#FAFAF9"/>
    <rect x="44" y="14" width="22" height="22" rx="2" fill="#FAFAF9" opacity="0.4"/>
    <rect x="14" y="44" width="22" height="22" rx="2" fill="#FAFAF9" opacity="0.4"/>
    <rect x="44" y="44" width="22" height="22" rx="2" fill="#FAFAF9"/>
  </g>

  <text
    x="120"
    y="80"
    font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
    font-size="64"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#0F172A"
